# INCA — UNM Model
# Generated by: Code-to-UNM Analysis
# Source: /src/code.uber.internal/delivery/inca/
# Date: 2026-03-19
# Services analyzed: 33
# Confidence: medium-high — team ownership sourced from per-service METADATA files
#   (reviewers.groups field) as primary source. For 6 services whose METADATA still
#   listed the org-level "inca-dev" group, ownership was resolved via the internal
#   "INCA Platform Organisation Design" doc (Kristian Zachariassen, Feb 2026) which
#   defines 7 platform sub-teams. External dependency details partially inferred from
#   pkg/gateway/ package structure. Some serving-layer data flows inferred from
#   Docstore table names rather than confirmed RPC traces.

system:
  name: "INCA"
  description: >
    INCA (Inventory & Catalog Platform) is Uber's large-scale distributed platform for managing
    catalog and inventory data. It handles the full lifecycle of menu and catalog data: ingestion
    from merchant feeds, validation and publishing, indexing for high-performance reads, and serving
    to downstream consumers. The platform consists of 33 microservices and workers that together
    form the authoritative source of truth for Uber Eats catalog entities (items, sections, products,
    catalogs). INCA serves merchants submitting menus, eaters browsing restaurants, and internal
    platform teams building features on top of catalog data. Ownership is organized across eight INCA
    sub-teams (Feed, Core, Publishing, Serving, Model & Conversion, Observability, Catalog Quality,
    Catalog Experience) plus one external team (dotcom-eng) that operates a service within the INCA
    ecosystem. Team structure sourced from the INCA Platform Organisation Design doc (Feb 2026).

actors:
  - name: "Merchant / Restaurant Partner"
    description: >
      Restaurant owners and their integration partners who submit menu data to Uber Eats.
      They care about accurate representation of their menu, timely propagation of changes,
      and visibility into processing failures.

  - name: "Eater / Consumer"
    description: >
      End users of the Uber Eats app who browse restaurant menus and place orders.
      They experience INCA's output indirectly through menu display, item availability,
      and pricing accuracy.

  - name: "Downstream Platform Team"
    description: >
      Internal engineering teams (storefront, pricing, availability, promotions) that build
      features using INCA catalog data. They consume catalog entities via RPC, Kafka events,
      and the serving layer.

  - name: "INCA Platform Engineer"
    description: >
      On-call and platform engineers responsible for operating and maintaining INCA services.
      They need visibility into data quality, the ability to debug production state, and tools
      to perform operational tasks like backups and bulk corrections.

needs:
  - name: "Submit menu changes and see them live for eaters within SLA"
    actor: "Merchant / Restaurant Partner"
    outcome: >
      A merchant submits a feed containing menu updates; those changes are ingested, validated,
      published, and reflected in the eater-facing catalog within the agreed service level
      (typically minutes), without manual intervention.
    supportedBy:
      - target: "Feed Submission & Job Tracking"
        description: "Provides the API entry point and job status tracking for submitted feeds"
      - target: "Feed Ingestion & Processing"
        description: "Processes submitted feed data through validation and entity writes"
      - target: "Entity Publishing & Validation"
        description: "Validates and publishes entities so they become visible in the serving layer"
      - target: "Serving Data Synchronization"
        description: "Propagates entity changes to the serving data store for read access"

  - name: "Understand why a feed failed and correct the issue"
    actor: "Merchant / Restaurant Partner"
    outcome: >
      When a feed fails validation or processing, the merchant or their integration partner
      receives actionable error information identifying which items failed and why,
      so they can correct and resubmit.
    supportedBy:
      - target: "Feed Submission & Job Tracking"
        description: "Exposes feed job status and error details via FeedAPIService"
      - target: "Issue Tracking & Management"
        description: "Stores and surfaces structured issues from feed validation failures"

  - name: "Ensure menu images are correctly associated and render properly"
    actor: "Merchant / Restaurant Partner"
    outcome: >
      Images submitted with catalog entities are processed, validated, and stored so that
      they render correctly in the Uber Eats app without broken links or wrong associations.
    supportedBy:
      - target: "Image Processing & Management"
        description: "Handles image upload, validation, and association with catalog entities"
      - target: "Blob Storage"
        description: "Provides durable storage for processed image assets"

  - name: "View accurate, up-to-date menus when browsing"
    actor: "Eater / Consumer"
    outcome: >
      An eater browsing the Uber Eats app sees a restaurant menu that accurately reflects
      the restaurant's current offerings, including correct items, prices, and availability,
      updated within the platform's freshness SLA.
    supportedBy:
      - target: "Real-time Catalog Serving"
        description: "Delivers current catalog data to consumer-facing surfaces"
      - target: "Indexed Catalog Query"
        description: "Provides fast, indexed access to catalog sections and items"
      - target: "Menu Cache Generation"
        description: "Maintains pre-computed menu views for serving performance"

  - name: "Get fast, complete menu data for purchase decisions"
    actor: "Eater / Consumer"
    outcome: >
      Menu pages load quickly with full item details (descriptions, photos, modifiers, prices)
      so the eater can make informed purchase decisions without delays.
    supportedBy:
      - target: "Real-time Catalog Serving"
        description: "Serves complete item records from the serving layer"
      - target: "Indexed Catalog Query"
        description: "Provides indexed access with low read latency"
      - target: "Serving Data Synchronization"
        description: "Keeps serving data up-to-date from the authoritative entity store"

  - name: "Reliably access current catalog data to build downstream features"
    actor: "Downstream Platform Team"
    outcome: >
      A downstream team can call INCA APIs to read catalog entities with high availability
      and consistent data, enabling them to build pricing, availability, and storefront features
      without worrying about stale or missing data.
    supportedBy:
      - target: "Entity CRUD & Lifecycle"
        description: "Provides the authoritative read API for catalog entities"
      - target: "Indexed Catalog Query"
        description: "Supports high-volume indexed reads for downstream consumers"

  - name: "Receive real-time notifications of catalog entity changes"
    actor: "Downstream Platform Team"
    outcome: >
      Downstream systems can subscribe to catalog change events and react in near-real-time
      when entities are created, updated, or deleted, keeping their own data synchronized
      without polling.
    supportedBy:
      - target: "Entity Change Event Emission"
        description: "Produces entity change events to Kafka topics consumed by downstream systems"

  - name: "Recover catalog data from a specific point in time after data corruption"
    actor: "INCA Platform Engineer"
    outcome: >
      An on-call engineer can restore a catalog to a known-good state from a backup taken
      at a specific point in time, minimizing data loss after a corruption incident.
    supportedBy:
      - target: "Backup & Point-in-Time Recovery"
        description: "Provides full catalog backup and time-based restore via Cadence workflows"

  - name: "Debug entity state and trace feed processing history in production"
    actor: "INCA Platform Engineer"
    outcome: >
      An engineer can inspect the current state of any catalog entity and trace how it arrived
      at that state (which feed changed it, when, what validations ran) without needing
      direct database access.
    supportedBy:
      - target: "Operational CLI Tooling"
        description: "Provides entity inspection, feed debugging, and catalog audit subcommands"
      - target: "MCP Debug Interface"
        description: "Exposes interactive tools for reading entity state and simulating publishing"
      - target: "Administrative & Bulk Operations"
        description: "Provides admin APIs for entity inspection and semantic validation"

  - name: "Detect and remediate regressions in catalog data quality proactively"
    actor: "INCA Platform Engineer"
    outcome: >
      The platform continuously monitors catalog data for statistical anomalies or regressions
      and alerts engineers before eaters or merchants are impacted.
    supportedBy:
      - target: "Regression Detection & Statistical Analysis"
        description: "Continuously monitors catalog stats and detects deviations from baseline"
      - target: "Issue Tracking & Management"
        description: "Records detected issues for triage and remediation tracking"

  - name: "Perform safe bulk corrections on catalog data"
    actor: "INCA Platform Engineer"
    outcome: >
      An engineer can apply bulk changes to catalog entities via a controlled administrative
      interface, with auditability and rollback options.
    supportedBy:
      - target: "Administrative & Bulk Operations"
        description: "Provides controlled bulk entity management operations"
      - target: "Data Scrubbing & Cleanup"
        description: "Runs automated and manual cleanup workflows to correct data issues"

capabilities:
  - name: "Feed & Ingestion Management"
    description: "All capabilities for receiving, processing, and tracking data feeds from merchants and external systems"
    visibility: "user-facing"
    ownedBy: "inca-ingestion-dev"
    children:
      - name: "Feed Submission & Job Tracking"
        description: "Accepts feed submissions from merchants and integration partners; provides job status and error visibility"
        visibility: "user-facing"
        realizedBy:
          - target: "inca-feed-api"
            role: "primary"
            description: "Exposes FeedAPIService RPC with SubmitFeed and GetJob methods"
        dependsOn:
          - target: "Feed Ingestion & Processing"
            description: "Feed submission triggers asynchronous processing by feed-worker"

      - name: "Feed Ingestion & Processing"
        description: "Processes submitted feed payloads through validation, transformation, and entity writes in Cadence workflows"
        visibility: "domain"
        realizedBy:
          - target: "inca-feed-worker"
            role: "primary"
            description: "Cadence worker executing feed processing workflows (task list: feed-processing-internal)"
          - target: "inca-feed-adhoc-worker"
            role: "supporting"
            description: "Handles ad-hoc and one-off feed processing workflows outside the scheduled pipeline"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Feed processing writes entity changes through inca-core's EntityService"
          - target: "Entity Publishing & Validation"
            description: "Feed worker triggers publisher to validate and publish processed entities"
          - target: "Issue Tracking & Management"
            description: "Feed validation errors are persisted to issue-store"

      - name: "Hive Data Ingestion"
        description: "Ingests catalog data from Hive data warehouse via Heatpipe message pipelines"
        visibility: "domain"
        realizedBy:
          - target: "inca-hive-ingester"
            role: "primary"
            description: "Cadence worker + API server consuming Heatpipe messages from Hive pipelines"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Persists ingested Hive entities through inca-core's EntityService"

      - name: "Social Media Content Ingestion"
        description: "Ingests catalog images and content from social media platforms (Instagram Graph API)"
        visibility: "domain"
        realizedBy:
          - target: "inca-ig-ingester"
            role: "primary"
            description: "Cadence worker + API server for IG content with PrePublish workflow; owned by dotcom-eng"
        dependsOn:
          - target: "Entity Publishing & Validation"
            description: "IG-ingested content goes through publishing validation before becoming live"

  - name: "Catalog Entity Management"
    description: "Core capabilities for creating, reading, updating, deleting, and streaming catalog entities"
    visibility: "foundational"
    ownedBy: "inca-core-dev"
    children:
      - name: "Entity CRUD & Lifecycle"
        description: "Authoritative create, read, update, delete, and scan operations for all catalog entities (items, sections, products, catalogs)"
        visibility: "foundational"
        realizedBy:
          - target: "inca-core"
            role: "primary"
            description: "Exposes EntityService RPC: ReadEntity, UpsertEntity, UpdateEntity, DeleteEntity, ScanCatalog, ScanBackReferences"

      - name: "Entity Change Event Emission"
        description: "Emits Kafka events whenever catalog entities are created, updated, or deleted, enabling downstream systems to react in real-time"
        visibility: "infrastructure"
        realizedBy:
          - target: "inca-core"
            role: "primary"
            description: "Publishes to inca.core.entity_change Heatpipe topic on every entity mutation"

      - name: "Async Entity Writing"
        description: "Processes entity write operations from Kafka queues asynchronously, decoupling write throughput from synchronous API calls"
        visibility: "infrastructure"
        realizedBy:
          - target: "inca-async-entity-writer"
            role: "primary"
            description: "Kafka consumer that reads entity write messages and applies them to inca-core"
          - target: "inca-async"
            role: "supporting"
            description: "Provides async operation coordination and event emulation for entity writes"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Delegates actual entity writes to inca-core's EntityService"

  - name: "Content Publishing & Enrichment"
    description: "Capabilities for validating, enriching, and publishing catalog entities to make them visible to eaters"
    visibility: "domain"
    ownedBy: "inca-publisher-dev"
    children:
      - name: "Entity Publishing & Validation"
        description: "Validates catalog entities against business rules and publishes them to the serving layer; manages publishing lifecycle"
        visibility: "domain"
        realizedBy:
          - target: "inca-publisher"
            role: "primary"
            description: "PublisherService RPC exposing ProcessChangeEvent; runs validation pipeline"
          - target: "inca-publisher-worker"
            role: "supporting"
            description: "Cadence worker for async publishing workflows and retry logic"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads entities from inca-core to validate and enrich before publishing"
          - target: "Regression Detection & Statistical Analysis"
            description: "Publisher worker queries realtime-stats before publishing decisions"

      - name: "Menu Cache Generation"
        description: "Pre-computes and caches assembled menu views for performance optimization of the serving path"
        visibility: "domain"
        realizedBy:
          - target: "inca-menu-cache-worker"
            role: "primary"
            description: "Cadence worker running GenerateMenuCache workflow; writes assembled menu views to Docstore"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads entity data from inca-core to assemble menu cache"

      - name: "Image Processing & Management"
        description: "Handles image ingestion, validation, transformation, and association with catalog entities"
        visibility: "domain"
        realizedBy:
          - target: "inca-image"
            role: "primary"
            description: "Image service managing image lifecycle, validation, and Terrablob storage"
        dependsOn:
          - target: "Blob Storage"
            description: "Stores processed image files in inca-blob / Terrablob"
          - target: "Entity CRUD & Lifecycle"
            description: "Associates processed images with catalog entities via inca-core"

      - name: "Data Transformation & Conversion"
        description: "Transforms catalog data between model formats and converts between catalog and menu representations"
        visibility: "domain"
        realizedBy:
          - target: "inca-transformer"
            role: "primary"
            description: "Cadence worker + API server transforming entities between formats; persists in MySQL"
          - target: "inca-model-conversion-worker"
            role: "supporting"
            description: "Cadence worker converting between catalog and menu model representations; owned by inca-model-conversion-dev"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads and writes transformed entities through inca-core"

      - name: "Catalog Entity Enrichment"
        description: "Computes and applies extension attribute values to catalog entities before publication using the Product Enrichment Framework (PEF). Enrichers derive product usage tags and approximate product IDs; a Change Management gate validates enrichment correctness by comparing entity enrichments between source and target environments via Cadence."
        visibility: "domain"
        realizedBy:
          - target: "inca-serverless"
            role: "primary"
            description: "Serverless PEF enricher functions (productusagetag, approximateproductid) + cm-inca-gate Cadence worker running serverless_compare_entities_workflow on inca-pef-safe-deployment domain"
        dependsOn:
          - target: "Entity Publishing & Validation"
            description: "cm-inca-gate calls SimulatePublishEntity on inca-publisher to compare enrichment results between environments"
          - target: "Entity CRUD & Lifecycle"
            description: "Reads entity data from inca-core during enrichment processing"
          - target: "Registry & Configuration Management"
            description: "Reads catalog and item definitions from inca-registry for enrichment context"

      - name: "Entity Construction"
        description: "Builds assembled entity objects from flattened extension values for downstream consumption"
        visibility: "foundational"
        realizedBy:
          - target: "inca-entity-builder"
            role: "primary"
            description: "API service exposing /build endpoint; assembles entities from extension attribute values"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads raw entities and extension data from inca-core"

  - name: "Catalog Serving & Access"
    description: "Capabilities for reading catalog data at high scale and low latency for consumer and downstream surfaces"
    visibility: "user-facing"
    ownedBy: "inca-serving"
    children:
      - name: "Real-time Catalog Serving"
        description: "Serves current catalog data (items, sections, products) to consumer-facing surfaces at high throughput"
        visibility: "user-facing"
        realizedBy:
          - target: "inca-serving"
            role: "primary"
            description: "CatalogServing gRPC exposing GetItems, ScanSection for eater-facing reads"
          - target: "inca-serving-gateway"
            role: "supporting"
            description: "Gateway routing layer; successor to restaurant-gateway for serving endpoints"
        dependsOn:
          - target: "Serving Data Synchronization"
            description: "Reads from catalog_item_v1 tables kept up-to-date by serving-ingestor"

      - name: "Indexed Catalog Query"
        description: "Provides fast, index-based access to catalog sections and items for search and browse use cases"
        visibility: "user-facing"
        realizedBy:
          - target: "inca-query"
            role: "primary"
            description: "CatalogQueryService gRPC with ScanSection; optimized for indexed reads; owned by catalog-quality-eng"
        dependsOn:
          - target: "Catalog Indexing"
            description: "Queries depend on the index built and maintained by indexer-worker"

      - name: "Catalog Indexing"
        description: "Builds and maintains search and catalog indexes to enable fast indexed reads"
        visibility: "foundational"
        realizedBy:
          - target: "inca-indexer"
            role: "primary"
            description: "Indexing API server orchestrating index builds"
          - target: "inca-indexer-worker"
            role: "supporting"
            description: "Cadence worker executing IndexPublishedItems and IndexCatalog workflows"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads entities from inca-core to populate index entries"

      - name: "Serving Data Synchronization"
        description: "Continuously synchronizes entity changes from the authoritative store to the serving data layer"
        visibility: "infrastructure"
        realizedBy:
          - target: "inca-serving-ingestor"
            role: "primary"
            description: "Kafka consumer for inca.core.entity_change and hp-eats_store-menu_entity_update_v4; writes to catalog_item_v1, catalog_product_v1"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads full entity details from inca-core when processing change notifications"
          - target: "Entity Change Event Emission"
            description: "Consumes entity change events from inca.core.entity_change Kafka topic"

  - name: "Data Quality & Platform Health"
    description: "Capabilities for detecting regressions, tracking issues, scrubbing bad data, and maintaining overall catalog quality"
    visibility: "foundational"
    ownedBy: "inca-observability-dev"
    children:
      - name: "Regression Detection & Statistical Analysis"
        description: "Monitors catalog metrics for statistical deviations and detects regressions in data quality before they impact eaters"
        visibility: "foundational"
        realizedBy:
          - target: "inca-regression-detector"
            role: "primary"
            description: "Aggregates stats over time windows, detects anomalies, produces to inca.regressions Kafka topic"
          - target: "inca-realtime-stats"
            role: "supporting"
            description: "Tracks real-time per-catalog statistics and runs Cadence-based consistency checks"
        dependsOn:
          - target: "Menu Cache Generation"
            description: "Uses menu cache data as baseline for regression detection comparisons"

      - name: "Issue Tracking & Management"
        description: "Stores, surfaces, and manages structured issues arising from feed validation failures and data quality checks"
        visibility: "foundational"
        realizedBy:
          - target: "inca-issue-store"
            role: "primary"
            description: "IssueStore gRPC with SyncIssues, ListProducerIssues; tracks validation failures per producer"

      - name: "Data Scrubbing & Cleanup"
        description: "Performs automated cleanup, deduplication, and trimming of stale or corrupt catalog data"
        visibility: "foundational"
        realizedBy:
          - target: "inca-scrubber"
            role: "primary"
            description: "Cadence worker + API server running cleanup, deduplicate, and trimming workflows"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads entities for analysis and deletes stale records via inca-core's EntityService"

      - name: "Backup & Point-in-Time Recovery"
        description: "Creates periodic backups of all catalog entities and supports restoring them to a specific point in time"
        visibility: "foundational"
        realizedBy:
          - target: "inca-backup"
            role: "primary"
            description: "gRPC Backup API + Cadence workflows: BackupCatalog, RestoreCatalog, EnsureBackup"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Reads all entities via ScanCatalog for backup; writes back via UpsertEntity on restore"
          - target: "Blob Storage"
            description: "Stores backup artifact files in inca-blob / Terrablob"

  - name: "Platform Configuration & Operations"
    description: "Cross-cutting capabilities for configuration management, administration, and operational tooling"
    visibility: "foundational"
    ownedBy: "inca-core-dev"
    children:
      - name: "Registry & Configuration Management"
        description: "Manages dynamic configuration for INCA services including schema registries and service config"
        visibility: "foundational"
        realizedBy:
          - target: "inca-registry"
            role: "primary"
            description: "ConfigService gRPC providing dynamic configuration to other INCA services"

      - name: "Administrative & Bulk Operations"
        description: "Provides controlled administrative operations: semantic validation, bulk entity management, and operator-facing tooling"
        visibility: "domain"
        realizedBy:
          - target: "inca-admin"
            role: "primary"
            description: "Admin gRPC service: Create, PerformSemanticValidation, and bulk entity operations"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Admin operations read and write entities through inca-core"

      - name: "Blob Storage"
        description: "Provides on-premises blob/file storage for catalog assets such as images and backup artifacts"
        visibility: "infrastructure"
        realizedBy:
          - target: "inca-blob"
            role: "primary"
            description: "Blob storage service backed by Docstore and Terrablob"

      - name: "Operational CLI Tooling"
        description: "Command-line tool for operators to inspect, debug, and perform maintenance tasks on catalog data"
        visibility: "domain"
        realizedBy:
          - target: "inca-tool"
            role: "primary"
            description: "inca-tool CLI with subcommands: catalog, feed, menu, image, backup, migration support"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "Entity inspection commands read from inca-core"
          - target: "Administrative & Bulk Operations"
            description: "CLI wraps admin operations for operator convenience"

      - name: "MCP Debug Interface"
        description: "Machine-readable debug interface exposing entity inspection and publishing simulation for developer tooling"
        visibility: "domain"
        realizedBy:
          - target: "inca-mcp"
            role: "primary"
            description: "MCP server with tools: readentity, getcatalogconfig, simulatepublishing"
        dependsOn:
          - target: "Entity CRUD & Lifecycle"
            description: "readentity tool reads entity state from inca-core"
          - target: "Entity Publishing & Validation"
            description: "simulatepublishing tool invokes publisher service"

      - name: "Platform Health Monitoring"
        description: "Minimal health status reporting for infrastructure readiness checks and service discovery"
        visibility: "infrastructure"
        realizedBy:
          - target: "inca-status"
            role: "primary"
            description: "Minimal gRPC health check service for infrastructure readiness probes"

services:
  - name: "inca-core"
    description: "Authoritative entity CRUD API; main Docstore-backed database interaction layer for all catalog entities"
    ownedBy: "inca-core-dev"

  - name: "inca-feed-api"
    description: "RPC server for feed submission and job status tracking; exposes FeedAPIService (SubmitFeed, GetJob)"
    ownedBy: "inca-ingestion-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads catalog configuration and entity state during feed job coordination"

  - name: "inca-publisher"
    description: "Publishing and validation API server; runs entity validation pipelines and manages publishing lifecycle via PublisherService.ProcessChangeEvent"
    ownedBy: "inca-publisher-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads and enriches entities from EntityService before publishing"

  - name: "inca-serving"
    description: "Read-optimized serving API exposing CatalogServing gRPC (GetItems, ScanSection) for consumer-facing applications"
    ownedBy: "inca-serving"

  - name: "inca-query"
    description: "Indexed catalog query API exposing CatalogQueryService gRPC (ScanSection) for fast, index-based catalog browsing"
    ownedBy: "catalog-quality-eng"

  - name: "inca-indexer"
    description: "Catalog indexing API server that orchestrates the building of catalog search indexes"
    ownedBy: "inca-core-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads entities from EntityService to build index entries"

  - name: "inca-admin"
    description: "Administrative operations API for semantic validation, bulk entity management, and operator tasks"
    ownedBy: "inca-core-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads and writes entities via EntityService for admin operations"

  - name: "inca-backup"
    description: "Backup and restore service combining a gRPC API with Cadence workflows: BackupCatalog, RestoreCatalog, EnsureBackup"
    ownedBy: "inca-observability-dev"
    dependsOn:
      - target: "inca-core"
        description: "ScanCatalog to read all entities for backup; UpsertEntity to write them back on restore"
      - target: "inca-blob"
        description: "Stores and retrieves backup artifact files"

  - name: "inca-feed-worker"
    description: "Cadence worker executing feed processing workflows (task list: feed-processing-internal)"
    ownedBy: "inca-ingestion-dev"
    dependsOn:
      - target: "inca-core"
        description: "EntityService for reading and writing catalog entities during feed processing"
      - target: "inca-feed-api"
        description: "FeedAPIService for job status updates and feed metadata"
      - target: "inca-publisher"
        description: "PublisherService to trigger entity publishing after feed writes"
      - target: "inca-menu-cache-worker"
        description: "MenuCacheWorkerService to invalidate and regenerate menu caches after changes"
      - target: "inca-issue-store"
        description: "IssueStoreService to persist validation failures from feed processing"

  - name: "inca-publisher-worker"
    description: "Cadence worker for asynchronous publishing workflows and retry logic"
    ownedBy: "inca-publisher-dev"
    dependsOn:
      - target: "inca-publisher"
        description: "PublishingManagementService and PublishingStatusService for workflow orchestration"
      - target: "inca-realtime-stats"
        description: "RealtimeStatsService to check catalog statistics before publishing decisions"
      - target: "inca-feed-api"
        description: "FeedAPIService for feed metadata during publishing workflows"

  - name: "inca-indexer-worker"
    description: "Cadence worker executing IndexPublishedItems and IndexCatalog workflows"
    ownedBy: "inca-core-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads entities from EntityService to build index entries"
      - target: "inca-indexer"
        description: "Coordinates index build operations with the indexer API"

  - name: "inca-menu-cache-worker"
    description: "Cadence worker running GenerateMenuCache workflow; assembles and caches complete menu views"
    ownedBy: "inca-model-conversion-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads entity data via EntityService to assemble menu caches"

  - name: "inca-registry"
    description: "Configuration management service exposing ConfigService gRPC"
    ownedBy: "inca-core-dev"

  - name: "inca-entity-builder"
    description: "Entity construction API that assembles entity objects from flattened extension attribute values"
    ownedBy: "inca-publisher-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads raw entities and extension data from EntityService"

  - name: "inca-issue-store"
    description: "Issue management API exposing IssueStore gRPC (SyncIssues, ListProducerIssues)"
    ownedBy: "inca-observability-dev"

  - name: "inca-blob"
    description: "On-premises blob storage service backed by Docstore for catalog assets"
    ownedBy: "inca-core-dev"

  - name: "inca-async"
    description: "Async operations coordination service providing EmulateConsumeDBEvent for decoupled entity processing"
    ownedBy: "inca-publisher-dev"
    dependsOn:
      - target: "inca-core"
        description: "Delegates entity operations to EntityService"

  - name: "inca-async-entity-writer"
    description: "Kafka consumer service that reads entity write messages and applies them asynchronously to the entity store"
    ownedBy: "inca-core-dev"
    dependsOn:
      - target: "inca-core"
        description: "Writes entities via EntityService upon consuming Kafka messages"

  - name: "inca-hive-ingester"
    description: "Hive data ingestion service combining a Cadence worker and API server; processes Heatpipe messages from Hive pipelines"
    ownedBy: "inca-ingestion-dev"
    dependsOn:
      - target: "inca-core"
        description: "Writes ingested Hive entities to EntityService"

  - name: "inca-ig-ingester"
    description: "Instagram content ingestion service; Cadence worker + API server running PrePublish workflow for IG-sourced items"
    ownedBy: "dotcom-eng"
    dependsOn:
      - target: "inca-publisher"
        description: "Triggers PrePublish workflow via PublisherService for IG-ingested content"

  - name: "inca-image"
    description: "Image processing API managing image lifecycle: ingestion, validation, transformation, and Terrablob storage"
    ownedBy: "inca-ingestion-dev"
    dependsOn:
      - target: "inca-blob"
        description: "Stores processed image artifacts"
      - target: "inca-core"
        description: "Associates processed images with catalog entities via EntityService"

  - name: "inca-realtime-stats"
    description: "Real-time statistics service tracking per-catalog metrics and running Cadence-based consistency checks"
    ownedBy: "inca-observability-dev"
    dependsOn:
      - target: "inca-regression-detector"
        description: "RegressionDetectorService to correlate live stats with detected regressions"

  - name: "inca-regression-detector"
    description: "Regression detection service aggregating catalog stats, detecting anomalies, producing to inca.regressions Kafka topic"
    ownedBy: "inca-observability-dev"
    dependsOn:
      - target: "inca-menu-cache-worker"
        description: "MenuCacheWorkerService to access cached menu baseline data for comparison"

  - name: "inca-transformer"
    description: "Data transformation service running Cadence workflows to convert entities between model formats; persists in MySQL"
    ownedBy: "catalog-quality-eng"
    dependsOn:
      - target: "inca-core"
        description: "Reads and writes transformed entities via EntityService"

  - name: "inca-serverless"
    description: "Product Enrichment Framework (PEF) serverless service hosting two components: (1) enricher functions that compute extension attribute values for catalog entities (productusagetag, approximateproductid) before publication; (2) cm-inca-gate, a Change Management gate that validates publishing changes by running Cadence workflows comparing entity enrichments across environments"
    ownedBy: "inca-publisher-dev"
    dependsOn:
      - target: "inca-publisher"
        description: "SimulatePublishEntity RPC used by cm-inca-gate to simulate publishing with custom enricher configuration for comparison"
      - target: "inca-core"
        description: "EntityService for retrieving entity data during enrichment"
      - target: "inca-registry"
        description: "CatalogManagementService for catalog and item definitions used as enrichment context"

  - name: "inca-scrubber"
    description: "Data scrubbing service combining a Cadence worker and API for cleanup, deduplication, and trimming"
    ownedBy: "inca-publisher-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads entities for deduplication analysis and deletes stale records via EntityService"

  - name: "inca-feed-adhoc-worker"
    description: "Cadence worker for ad-hoc and one-off feed processing jobs outside the standard scheduled feed pipeline"
    ownedBy: "inca-ingestion-dev"

  - name: "inca-model-conversion-worker"
    description: "Cadence worker executing model conversion workflows between catalog and menu data representations"
    ownedBy: "inca-model-conversion-dev"
    dependsOn:
      - target: "inca-core"
        description: "Reads source entities and writes converted entities via EntityService"

  - name: "inca-serving-gateway"
    description: "Gateway routing layer for serving endpoints; migrated successor to restaurant-gateway"
    ownedBy: "inca-serving"
    dependsOn:
      - target: "inca-serving"
        description: "Routes requests to CatalogServing service"

  - name: "inca-serving-ingestor"
    description: "Kafka consumer syncing entity change events to serving-layer Docstore tables (catalog_item_v1, catalog_product_v1)"
    ownedBy: "inca-serving"
    dependsOn:
      - target: "inca-core"
        description: "Reads full entity details via EntityService when processing change notifications"

  - name: "inca-status"
    description: "Minimal health status reporting service providing gRPC health check endpoints for infrastructure readiness probes"
    ownedBy: "inca-observability-dev"

  - name: "inca-mcp"
    description: "MCP (Model Context Protocol) server exposing debugging tools: readentity, getcatalogconfig, simulatepublishing"
    ownedBy: "inca-catalog-experience-dev"
    dependsOn:
      - target: "inca-core"
        description: "readentity tool reads entity state via EntityService"
      - target: "inca-publisher"
        description: "simulatepublishing tool invokes publisher validation"

  - name: "inca-tool"
    description: "Multi-purpose operator CLI with subcommands: catalog, feed, menu, image, backup, migration support"
    ownedBy: "inca-catalog-experience-dev"
    dependsOn:
      - target: "inca-core"
        description: "Entity inspection commands read from EntityService"
      - target: "inca-admin"
        description: "Bulk and admin operations via Admin service"

teams:
  - name: "inca-core-dev"
    type: "platform"
    size: 5
    description: >
      Owns the authoritative catalog entity store (inca-core) and its immediate platform
      support services. Acts as an internal platform providing Entity CRUD to all other
      INCA teams and to external teams via x-as-a-service. Also owns async entity writing
      infrastructure.
    owns:
      - "Entity CRUD & Lifecycle"
      - "Entity Change Event Emission"
      - "Registry & Configuration Management"
      - "Administrative & Bulk Operations"
      - "Blob Storage"
      - "Async Entity Writing"
      - "Catalog Indexing"

  - name: "inca-ingestion-dev"
    type: "stream-aligned"
    size: 5
    description: >
      Owns the merchant feed ingestion pipeline end-to-end: feed API, feed processing
      workers, image handling, and Hive data ingestion. Aligned to the merchant feed
      submission and data ingestion flow.
    owns:
      - "Feed Submission & Job Tracking"
      - "Feed Ingestion & Processing"
      - "Image Processing & Management"
      - "Hive Data Ingestion"

  - name: "inca-publisher-dev"
    type: "stream-aligned"
    size: 5
    description: >
      Owns entity publishing, validation, and downstream enrichment services including
      entity construction, async writes, and data scrubbing. Aligned to the entity
      publishing and distribution flow.
    owns:
      - "Entity Publishing & Validation"
      - "Catalog Entity Enrichment"
      - "Entity Construction"
      - "Data Scrubbing & Cleanup"

  - name: "inca-serving"
    type: "stream-aligned"
    size: 5
    description: >
      Owns the eater-facing serving layer: the CatalogServing API, the serving gateway,
      and the serving-ingestor that keeps serving data synchronized. Aligned to the
      consumer read path. (LDAP group name: "inca".)
    owns:
      - "Real-time Catalog Serving"
      - "Serving Data Synchronization"

  - name: "inca-catalog-experience-dev"
    type: "stream-aligned"
    size: 5
    description: >
      Owns operational migration tooling and developer-facing catalog interfaces.
      Aligned to the Catalog Experience team defined in the INCA Platform Organisation
      Design (Feb 2026). Primary focus: operational migration workflows, catalogue tooling,
      and developer experience interfaces (MCP, CLI).
    owns:
      - "Operational CLI Tooling"
      - "MCP Debug Interface"

  - name: "inca-observability-dev"
    type: "complicated-subsystem"
    size: 5
    description: >
      Owns statistical regression detection, real-time monitoring, issue tracking,
      backup/restore, and platform health status. Specializes in the deep statistics
      and reliability capabilities that underpin catalog quality guarantees.
    owns:
      - "Regression Detection & Statistical Analysis"
      - "Issue Tracking & Management"
      - "Backup & Point-in-Time Recovery"
      - "Platform Health Monitoring"

  - name: "inca-model-conversion-dev"
    type: "stream-aligned"
    size: 5
    description: >
      Owns menu cache generation and model conversion workflows; aligned to the
      catalog-to-menu data pipeline and serving cache population.
    owns:
      - "Menu Cache Generation"
      - "Data Transformation & Conversion"

  - name: "catalog-quality-eng"
    type: "complicated-subsystem"
    size: 5
    description: >
      INCA sub-team (Catalog Quality in the INCA Platform Organisation Design) that owns
      quality frameworks, enrichers, validators, indexed query, catalog indexing, and
      data transformation pipeline. Provides specialized indexing and transformation
      capabilities to the INCA platform. LDAP group: catalog-quality-eng.
    owns:
      - "Indexed Catalog Query"
      - "Data Transformation & Conversion"

  - name: "dotcom-eng"
    type: "stream-aligned"
    size: 5
    description: >
      External team (outside INCA org) that owns the Instagram content ingestion
      service (inca-ig-ingester). Deploys and operates a service within the INCA
      platform boundary but is not part of the INCA org.
    owns:
      - "Social Media Content Ingestion"

platforms:
  - name: "Uber Eats Infrastructure Platform"
    description: >
      Shared infrastructure services providing workflow orchestration (Cadence), event streaming
      (Kafka/Heatpipe), schemaless storage (Docstore/Safe DB), blob storage (Terrablob),
      and feature flags (Flipr). All INCA services consume these as external platform primitives.
    teams:
      - "inca-core-dev"
    provides:
      - "Async Entity Writing"
      - "Entity Change Event Emission"

interactions:
  - from: "inca-ingestion-dev"
    to: "inca-core-dev"
    mode: "x-as-a-service"
    via: "Entity CRUD & Lifecycle"
    description: "Feed workers and feed-api read/write catalog entities through inca-core's EntityService"

  - from: "inca-publisher-dev"
    to: "inca-core-dev"
    mode: "x-as-a-service"
    via: "Entity CRUD & Lifecycle"
    description: "Publisher and entity-builder read entities from inca-core before publishing and construction"

  - from: "inca-serving"
    to: "inca-core-dev"
    mode: "x-as-a-service"
    via: "Entity CRUD & Lifecycle"
    description: "Serving-ingestor reads full entity details from inca-core when processing change notifications"

  - from: "inca-core-dev"
    to: "inca-core-dev"
    mode: "x-as-a-service"
    via: "Async Entity Writing"
    description: "inca-async-entity-writer (owned by inca-core-dev) writes entities via EntityService upon consuming Kafka messages"

  - from: "inca-ingestion-dev"
    to: "inca-ingestion-dev"
    mode: "collaboration"
    via: "Hive Data Ingestion"
    description: "inca-hive-ingester is part of the ingestion team's portfolio, writing Hive-sourced entities to inca-core"

  - from: "inca-observability-dev"
    to: "inca-core-dev"
    mode: "x-as-a-service"
    via: "Entity CRUD & Lifecycle"
    description: "inca-backup reads all entities via ScanCatalog and writes them back on restore"

  - from: "catalog-quality-eng"
    to: "inca-core-dev"
    mode: "x-as-a-service"
    via: "Entity CRUD & Lifecycle"
    description: "inca-transformer and inca-indexer read and write entities via inca-core's EntityService"

  - from: "catalog-quality-eng"
    to: "inca-core-dev"
    mode: "x-as-a-service"
    via: "Catalog Indexing"
    description: "inca-query (catalog-quality-eng) depends on the index built by inca-indexer-worker (inca-core-dev)"

  - from: "dotcom-eng"
    to: "inca-publisher-dev"
    mode: "x-as-a-service"
    via: "Entity Publishing & Validation"
    description: "inca-ig-ingester (owned by dotcom-eng) triggers PrePublish workflow via inca-publisher"

  - from: "inca-ingestion-dev"
    to: "inca-publisher-dev"
    mode: "x-as-a-service"
    via: "Entity Publishing & Validation"
    description: "inca-feed-worker triggers entity publishing via PublisherService after writing feed entities"

  - from: "inca-observability-dev"
    to: "inca-model-conversion-dev"
    mode: "x-as-a-service"
    via: "Menu Cache Generation"
    description: "inca-regression-detector calls MenuCacheWorkerService to access cached menu baseline data"

  - from: "inca-publisher-dev"
    to: "inca-observability-dev"
    mode: "x-as-a-service"
    via: "Regression Detection & Statistical Analysis"
    description: "inca-publisher-worker queries inca-realtime-stats before making publishing decisions"

  - from: "inca-ingestion-dev"
    to: "inca-model-conversion-dev"
    mode: "x-as-a-service"
    via: "Menu Cache Generation"
    description: "inca-feed-worker calls MenuCacheWorkerService to invalidate and regenerate caches after feed changes"

data_assets:
  - name: "inca_entity_v2"
    type: "database"
    description: "Primary Docstore collection storing all catalog entity records — the authoritative source of truth for INCA"
    usedBy:
      - target: "inca-core"
        access: "read-write"

  - name: "inca_extension_v2"
    type: "database"
    description: "Docstore collection storing flexible schema extension attributes for catalog entities"
    usedBy:
      - target: "inca-core"
        access: "read-write"

  - name: "inca_external_id_v2"
    type: "database"
    description: "Docstore collection mapping external source identifiers to INCA entity UUIDs"
    usedBy:
      - target: "inca-core"
        access: "read-write"

  - name: "inca_backref_v1"
    type: "database"
    description: "Docstore collection storing back-reference relationships between catalog entities"
    usedBy:
      - target: "inca-core"
        access: "read-write"

  - name: "inca_entity_metadata_v1"
    type: "database"
    description: "Docstore collection storing entity metadata (touched_at, provided_at) for change tracking"
    usedBy:
      - target: "inca-core"
        access: "read-write"

  - name: "catalog_item_v1"
    type: "database"
    description: "Serving-layer Docstore collection with denormalized item records optimized for high-throughput reads"
    usedBy:
      - target: "inca-serving-ingestor"
        access: "read-write"
      - target: "inca-serving"
        access: "read"
      - target: "inca-query"
        access: "read"

  - name: "catalog_product_v1"
    type: "database"
    description: "Serving-layer Docstore collection with denormalized product records for the serving path"
    usedBy:
      - target: "inca-serving-ingestor"
        access: "read-write"
      - target: "inca-serving"
        access: "read"

  - name: "catalog_item_mapping_v1"
    type: "database"
    description: "Docstore collection mapping menu item UUIDs to catalog item and product entries in the serving layer"
    usedBy:
      - target: "inca-serving-ingestor"
        access: "read-write"

  - name: "rawdata_user.kafka_hp_inca_core_entity_change_nodedup"
    type: "event-stream"
    description: "Deduplication-free Kafka topic of INCA core entity change events; consumed by inca-serverless enrichers to find entities with PEF metadata that need enrichment"
    producedBy: "inca-core"
    consumedBy:
      - "inca-serverless"

  - name: "inca.core.entity_change"
    type: "event-stream"
    description: "Heatpipe (Kafka) topic emitting entity change events whenever catalog entities are created, updated, or deleted in inca-core"
    producedBy: "inca-core"
    consumedBy:
      - "inca-serving-ingestor"

  - name: "hp-eats_store-menu_entity_update_v4"
    type: "event-stream"
    description: "Heatpipe topic from the eats_store system notifying INCA of external menu entity updates requiring catalog synchronization"
    producedBy: "eats-store"
    consumedBy:
      - "inca-serving-ingestor"

  - name: "inca.regressions"
    type: "event-stream"
    description: "Kafka topic carrying regression events detected by regression-detector for alerting and monitoring consumers"
    producedBy: "inca-regression-detector"
    consumedBy:
      - "inca-realtime-stats"

  - name: "inca.regression.stats"
    type: "event-stream"
    description: "Kafka topic carrying per-catalog statistical measurements for regression baseline tracking"
    producedBy: "inca-regression-detector"
    consumedBy:
      - "inca-realtime-stats"

external_dependencies:
  - name: "customer-gateway"
    description: "Uber's customer profile and identity platform"
    usedBy:
      - target: "inca-feed-worker"
        description: "Customer profile data for feed processing attribution"

  - name: "restaurant-gateway"
    description: "Restaurant data platform providing store and restaurant information"
    usedBy:
      - target: "inca-feed-worker"
        description: "Restaurant data and menu reliability checks during feed ingestion"

  - name: "eats-store"
    description: "Uber Eats store platform; also produces hp-eats_store-menu_entity_update_v4 Kafka events"
    usedBy:
      - target: "inca-feed-worker"
        description: "Store data retrieval during feed entity processing"
      - target: "inca-serving-ingestor"
        description: "Consumes hp-eats_store-menu_entity_update_v4 topic for catalog sync triggers"

  - name: "winterfell"
    description: "Uber Eats pricing service"
    usedBy:
      - target: "inca-feed-worker"
        description: "Price validation during feed ingestion"

  - name: "concord"
    description: "Uber's OAuth and identity service"
    usedBy:
      - target: "inca-feed-worker"
        description: "Identity verification for feed submission authentication"

  - name: "kms-gateway"
    description: "Key management service providing encryption keys"
    usedBy:
      - target: "inca-feed-worker"
        description: "Encryption and decryption of sensitive feed payload data"

  - name: "cadence"
    description: "Uber's Cadence workflow orchestration platform"
    usedBy:
      - target: "inca-feed-worker"
        description: "Feed processing workflow execution"
      - target: "inca-publisher-worker"
        description: "Publishing workflow execution"
      - target: "inca-indexer-worker"
        description: "Indexing workflow execution"
      - target: "inca-menu-cache-worker"
        description: "Menu cache generation workflow"
      - target: "inca-backup"
        description: "Backup and restore workflow execution"
      - target: "inca-scrubber"
        description: "Scrubbing and cleanup workflow execution"
      - target: "inca-transformer"
        description: "Data transformation workflow execution"
      - target: "inca-hive-ingester"
        description: "Hive ingestion workflow execution"
      - target: "inca-ig-ingester"
        description: "IG content ingestion workflow execution"
      - target: "inca-feed-adhoc-worker"
        description: "Ad-hoc feed workflow execution"
      - target: "inca-model-conversion-worker"
        description: "Model conversion workflow execution"
      - target: "inca-realtime-stats"
        description: "Stats consistency check workflow execution"

  - name: "terrablob"
    description: "Uber's distributed blob storage system"
    usedBy:
      - target: "inca-blob"
        description: "Backend storage for inca-blob service"
      - target: "inca-image"
        description: "Stores processed image files"

  - name: "flipr"
    description: "Uber's feature flag and dynamic configuration platform"
    usedBy:
      - target: "inca-core"
        description: "Feature gates for entity operations"
      - target: "inca-feed-worker"
        description: "Feature gates for feed processing logic"
      - target: "inca-publisher"
        description: "Feature gates for publishing pipeline"

  - name: "docstore"
    description: "Uber's Docstore (Safe DB) providing schemaless MySQL-backed document storage"
    usedBy:
      - target: "inca-core"
        description: "Primary storage for all entity collections"
      - target: "inca-serving-ingestor"
        description: "Storage for serving-layer collections"
      - target: "inca-blob"
        description: "Storage backend for blob service"

