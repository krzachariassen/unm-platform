system:
    name: INCA
    description: |
        INCA (Inventory & Catalog Platform) is Uber's large-scale distributed platform for managing catalog and inventory data. It handles the full lifecycle of menu and catalog data: ingestion from merchant feeds, validation and publishing, indexing for high-performance reads, and serving to downstream consumers. The platform consists of 33 microservices and workers that together form the authoritative source of truth for Uber Eats catalog entities (items, sections, products, catalogs). INCA serves merchants submitting menus, eaters browsing restaurants, and internal platform teams building features on top of catalog data. Ownership is organized across eight INCA sub-teams (Feed, Core, Publishing, Serving, Model & Conversion, Observability, Catalog Quality, Catalog Experience) plus one external team (dotcom-eng) that operates a service within the INCA ecosystem. Team structure sourced from the INCA Platform Organisation Design doc (Feb 2026).
actors:
    - name: Downstream Platform Team
      description: |
        Internal engineering teams (storefront, pricing, availability, promotions) that build features using INCA catalog data. They consume catalog entities via RPC, Kafka events, and the serving layer.
    - name: Eater / Consumer
      description: |
        End users of the Uber Eats app who browse restaurant menus and place orders. They experience INCA's output indirectly through menu display, item availability, and pricing accuracy.
    - name: INCA Platform Engineer
      description: |
        On-call and platform engineers responsible for operating and maintaining INCA services. They need visibility into data quality, the ability to debug production state, and tools to perform operational tasks like backups and bulk corrections.
    - name: Merchant / Restaurant Partner
      description: |
        Restaurant owners and their integration partners who submit menu data to Uber Eats. They care about accurate representation of their menu, timely propagation of changes, and visibility into processing failures.
needs:
    - name: Debug entity state and trace feed processing history in production
      actor: INCA Platform Engineer
      outcome: |
        An engineer can inspect the current state of any catalog entity and trace how it arrived at that state (which feed changed it, when, what validations ran) without needing direct database access.
      supportedBy:
        - target: Operational CLI Tooling
          description: Provides entity inspection, feed debugging, and catalog audit subcommands
        - target: MCP Debug Interface
          description: Exposes interactive tools for reading entity state and simulating publishing
        - target: Administrative & Bulk Operations
          description: Provides admin APIs for entity inspection and semantic validation
    - name: Detect and remediate regressions in catalog data quality proactively
      actor: INCA Platform Engineer
      outcome: |
        The platform continuously monitors catalog data for statistical anomalies or regressions and alerts engineers before eaters or merchants are impacted.
      supportedBy:
        - target: Regression Detection & Statistical Analysis
          description: Continuously monitors catalog stats and detects deviations from baseline
        - target: Issue Tracking & Management
          description: Records detected issues for triage and remediation tracking
    - name: Ensure menu images are correctly associated and render properly
      actor: Merchant / Restaurant Partner
      outcome: |
        Images submitted with catalog entities are processed, validated, and stored so that they render correctly in the Uber Eats app without broken links or wrong associations.
      supportedBy:
        - target: Image Processing & Management
          description: Handles image upload, validation, and association with catalog entities
        - target: Blob Storage
          description: Provides durable storage for processed image assets
    - name: Get fast, complete menu data for purchase decisions
      actor: Eater / Consumer
      outcome: |
        Menu pages load quickly with full item details (descriptions, photos, modifiers, prices) so the eater can make informed purchase decisions without delays.
      supportedBy:
        - target: Real-time Catalog Serving
          description: Serves complete item records from the serving layer
        - target: Indexed Catalog Query
          description: Provides indexed access with low read latency
        - target: Serving Data Synchronization
          description: Keeps serving data up-to-date from the authoritative entity store
    - name: Perform safe bulk corrections on catalog data
      actor: INCA Platform Engineer
      outcome: |
        An engineer can apply bulk changes to catalog entities via a controlled administrative interface, with auditability and rollback options.
      supportedBy:
        - target: Administrative & Bulk Operations
          description: Provides controlled bulk entity management operations
        - target: Data Scrubbing & Cleanup
          description: Runs automated and manual cleanup workflows to correct data issues
    - name: Receive real-time notifications of catalog entity changes
      actor: Downstream Platform Team
      outcome: |
        Downstream systems can subscribe to catalog change events and react in near-real-time when entities are created, updated, or deleted, keeping their own data synchronized without polling.
      supportedBy:
        - target: Entity Change Event Emission
          description: Produces entity change events to Kafka topics consumed by downstream systems
    - name: Recover catalog data from a specific point in time after data corruption
      actor: INCA Platform Engineer
      outcome: |
        An on-call engineer can restore a catalog to a known-good state from a backup taken at a specific point in time, minimizing data loss after a corruption incident.
      supportedBy:
        - target: Backup & Point-in-Time Recovery
          description: Provides full catalog backup and time-based restore via Cadence workflows
    - name: Reliably access current catalog data to build downstream features
      actor: Downstream Platform Team
      outcome: |
        A downstream team can call INCA APIs to read catalog entities with high availability and consistent data, enabling them to build pricing, availability, and storefront features without worrying about stale or missing data.
      supportedBy:
        - target: Entity CRUD & Lifecycle
          description: Provides the authoritative read API for catalog entities
        - target: Indexed Catalog Query
          description: Supports high-volume indexed reads for downstream consumers
    - name: Submit menu changes and see them live for eaters within SLA
      actor: Merchant / Restaurant Partner
      outcome: |
        A merchant submits a feed containing menu updates; those changes are ingested, validated, published, and reflected in the eater-facing catalog within the agreed service level (typically minutes), without manual intervention.
      supportedBy:
        - target: Feed Submission & Job Tracking
          description: Provides the API entry point and job status tracking for submitted feeds
        - target: Feed Ingestion & Processing
          description: Processes submitted feed data through validation and entity writes
        - target: Entity Publishing & Validation
          description: Validates and publishes entities so they become visible in the serving layer
        - target: Serving Data Synchronization
          description: Propagates entity changes to the serving data store for read access
    - name: Understand why a feed failed and correct the issue
      actor: Merchant / Restaurant Partner
      outcome: |
        When a feed fails validation or processing, the merchant or their integration partner receives actionable error information identifying which items failed and why, so they can correct and resubmit.
      supportedBy:
        - target: Feed Submission & Job Tracking
          description: Exposes feed job status and error details via FeedAPIService
        - target: Issue Tracking & Management
          description: Stores and surfaces structured issues from feed validation failures
    - name: View accurate, up-to-date menus when browsing
      actor: Eater / Consumer
      outcome: |
        An eater browsing the Uber Eats app sees a restaurant menu that accurately reflects the restaurant's current offerings, including correct items, prices, and availability, updated within the platform's freshness SLA.
      supportedBy:
        - target: Real-time Catalog Serving
          description: Delivers current catalog data to consumer-facing surfaces
        - target: Indexed Catalog Query
          description: Provides fast, indexed access to catalog sections and items
        - target: Menu Cache Generation
          description: Maintains pre-computed menu views for serving performance
capabilities:
    - name: Administrative & Bulk Operations
      description: 'Provides controlled administrative operations: semantic validation, bulk entity management, and operator-facing tooling'
      visibility: domain
      parent: Platform Configuration & Operations
      dependsOn:
        - target: Entity CRUD & Lifecycle
          description: Admin operations read and write entities through inca-core
    - name: Async Entity Writing
      description: Processes entity write operations from Kafka queues asynchronously, decoupling write throughput from synchronous API calls
      visibility: infrastructure
      parent: Catalog Entity Management
      dependsOn:
        - target: Entity CRUD & Lifecycle
          description: Delegates actual entity writes to inca-core's EntityService
    - name: Backup & Point-in-Time Recovery
      description: Creates periodic backups of all catalog entities and supports restoring them to a specific point in time
      visibility: foundational
      parent: Data Quality & Platform Health
      dependsOn:
        - target: Entity CRUD & Lifecycle
          description: Reads all entities via ScanCatalog for backup; writes back via UpsertEntity on restore
        - target: Blob Storage
          description: Stores backup artifact files in inca-blob / Terrablob
    - name: Blob Storage
      description: Provides on-premises blob/file storage for catalog assets such as images and backup artifacts
      visibility: infrastructure
      parent: Platform Configuration & Operations
    - name: Catalog Entity Enrichment
      description: Computes and applies extension attribute values to catalog entities before publication using the Product Enrichment Framework (PEF). Enrichers derive product usage tags and approximate product IDs; a Change Management gate validates enrichment correctness by comparing entity enrichments between source and target environments via Cadence.
      visibility: domain
      parent: Content Publishing & Enrichment
      dependsOn:
        - target: Entity Publishing & Validation
          description: cm-inca-gate calls SimulatePublishEntity on inca-publisher to compare enrichment results between environments
        - target: Entity CRUD & Lifecycle
          description: Reads entity data from inca-core during enrichment processing
        - target: Registry & Configuration Management
          description: Reads catalog and item definitions from inca-registry for enrichment context
    - name: Catalog Entity Management
      description: Core capabilities for creating, reading, updating, deleting, and streaming catalog entities
      visibility: foundational
    - name: Catalog Indexing
      description: Builds and maintains search and catalog indexes to enable fast indexed reads
      visibility: foundational
      parent: Catalog Serving & Access
      dependsOn:
        - target: Entity CRUD & Lifecycle
          description: Reads entities from inca-core to populate index entries
    - name: Catalog Serving & Access
      description: Capabilities for reading catalog data at high scale and low latency for consumer and downstream surfaces
      visibility: user-facing
    - name: Content Publishing & Enrichment
      description: Capabilities for validating, enriching, and publishing catalog entities to make them visible to eaters
      visibility: domain
    - name: Data Quality & Platform Health
      description: Capabilities for detecting regressions, tracking issues, scrubbing bad data, and maintaining overall catalog quality
      visibility: foundational
    - name: Data Scrubbing & Cleanup
      description: Performs automated cleanup, deduplication, and trimming of stale or corrupt catalog data
      visibility: foundational
      parent: Data Quality & Platform Health
      dependsOn:
        - target: Entity CRUD & Lifecycle
          description: Reads entities for analysis and deletes stale records via inca-core's EntityService
    - name: Data Transformation & Conversion
