      dependsOn:
        - target: inca-menu-cache-worker
          description: MenuCacheWorkerService to access cached menu baseline data for comparison
      realizes:
        - target: Regression Detection & Statistical Analysis
          description: Aggregates stats over time windows, detects anomalies, produces to inca.regressions Kafka topic
          role: primary
    - name: inca-scrubber
      description: Data scrubbing service combining a Cadence worker and API for cleanup, deduplication, and trimming
      ownedBy: inca-publisher-dev
      dependsOn:
        - target: inca-core
          description: Reads entities for deduplication analysis and deletes stale records via EntityService
      realizes:
        - target: Data Scrubbing & Cleanup
          description: Cadence worker + API server running cleanup, deduplicate, and trimming workflows
          role: primary
      externalDeps:
        - cadence
    - name: inca-serverless
      description: 'Product Enrichment Framework (PEF) serverless service hosting two components: (1) enricher functions that compute extension attribute values for catalog entities (productusagetag, approximateproductid) before publication; (2) cm-inca-gate, a Change Management gate that validates publishing changes by running Cadence workflows comparing entity enrichments across environments'
      ownedBy: inca-publisher-dev
      dependsOn:
        - target: inca-publisher
          description: SimulatePublishEntity RPC used by cm-inca-gate to simulate publishing with custom enricher configuration for comparison
        - target: inca-core
          description: EntityService for retrieving entity data during enrichment
        - target: inca-registry
          description: CatalogManagementService for catalog and item definitions used as enrichment context
      realizes:
        - target: Catalog Entity Enrichment
          description: Serverless PEF enricher functions (productusagetag, approximateproductid) + cm-inca-gate Cadence worker running serverless_compare_entities_workflow on inca-pef-safe-deployment domain
          role: primary
    - name: inca-serving
      description: Read-optimized serving API exposing CatalogServing gRPC (GetItems, ScanSection) for consumer-facing applications
      ownedBy: inca-serving
      realizes:
        - target: Real-time Catalog Serving
          description: CatalogServing gRPC exposing GetItems, ScanSection for eater-facing reads
          role: primary
    - name: inca-serving-gateway
      description: Gateway routing layer for serving endpoints; migrated successor to restaurant-gateway
      ownedBy: inca-serving
      dependsOn:
        - target: inca-serving
          description: Routes requests to CatalogServing service
      realizes:
        - target: Real-time Catalog Serving
          description: Gateway routing layer; successor to restaurant-gateway for serving endpoints
          role: supporting
    - name: inca-serving-ingestor
      description: Kafka consumer syncing entity change events to serving-layer Docstore tables (catalog_item_v1, catalog_product_v1)
      ownedBy: inca-serving
      dependsOn:
        - target: inca-core
          description: Reads full entity details via EntityService when processing change notifications
      realizes:
        - target: Serving Data Synchronization
          description: Kafka consumer for inca.core.entity_change and hp-eats_store-menu_entity_update_v4; writes to catalog_item_v1, catalog_product_v1
          role: primary
      externalDeps:
        - docstore
        - eats-store
    - name: inca-status
      description: Minimal health status reporting service providing gRPC health check endpoints for infrastructure readiness probes
      ownedBy: inca-observability-dev
      realizes:
        - target: Platform Health Monitoring
          description: Minimal gRPC health check service for infrastructure readiness probes
          role: primary
    - name: inca-tool
      description: 'Multi-purpose operator CLI with subcommands: catalog, feed, menu, image, backup, migration support'
      ownedBy: inca-catalog-experience-dev
      dependsOn:
        - target: inca-core
          description: Entity inspection commands read from EntityService
        - target: inca-admin
          description: Bulk and admin operations via Admin service
      realizes:
        - target: Operational CLI Tooling
          description: 'inca-tool CLI with subcommands: catalog, feed, menu, image, backup, migration support'
          role: primary
    - name: inca-transformer
      description: Data transformation service running Cadence workflows to convert entities between model formats; persists in MySQL
      ownedBy: catalog-quality-eng
      dependsOn:
        - target: inca-core
          description: Reads and writes transformed entities via EntityService
      realizes:
        - target: Data Transformation & Conversion
          description: Cadence worker + API server transforming entities between formats; persists in MySQL
          role: primary
      externalDeps:
        - cadence
teams:
    - name: catalog-quality-eng
      type: complicated-subsystem
      description: |
        INCA sub-team (Catalog Quality in the INCA Platform Organisation Design) that owns quality frameworks, enrichers, validators, indexed query, catalog indexing, and data transformation pipeline. Provides specialized indexing and transformation capabilities to the INCA platform. LDAP group: catalog-quality-eng.
      size: 5
      owns:
        - Data Transformation & Conversion
        - Indexed Catalog Query
      interacts:
        - with: inca-core-dev
          mode: x-as-a-service
          via: Entity CRUD & Lifecycle
          description: inca-transformer and inca-indexer read and write entities via inca-core's EntityService
        - with: inca-core-dev
          mode: x-as-a-service
          via: Catalog Indexing
          description: inca-query (catalog-quality-eng) depends on the index built by inca-indexer-worker (inca-core-dev)
    - name: dotcom-eng
      type: stream-aligned
      description: |
        External team (outside INCA org) that owns the Instagram content ingestion service (inca-ig-ingester). Deploys and operates a service within the INCA platform boundary but is not part of the INCA org.
      size: 5
      owns:
        - Social Media Content Ingestion
      interacts:
        - with: inca-publisher-dev
          mode: x-as-a-service
          via: Entity Publishing & Validation
          description: inca-ig-ingester (owned by dotcom-eng) triggers PrePublish workflow via inca-publisher
    - name: inca-catalog-experience-dev
      type: stream-aligned
      description: |
        Owns operational migration tooling and developer-facing catalog interfaces. Aligned to the Catalog Experience team defined in the INCA Platform Organisation Design (Feb 2026). Primary focus: operational migration workflows, catalogue tooling, and developer experience interfaces (MCP, CLI).
      size: 5
      owns:
        - MCP Debug Interface
        - Operational CLI Tooling
    - name: inca-core-dev
      type: platform
      description: |
        Owns the authoritative catalog entity store (inca-core) and its immediate platform support services. Acts as an internal platform providing Entity CRUD to all other INCA teams and to external teams via x-as-a-service. Also owns async entity writing infrastructure.
      size: 5
      owns:
        - Administrative & Bulk Operations
        - Async Entity Writing
        - Blob Storage
        - Catalog Indexing
        - Entity CRUD & Lifecycle
        - Entity Change Event Emission
        - Registry & Configuration Management
      interacts:
        - with: inca-core-dev
          mode: x-as-a-service
          via: Async Entity Writing
          description: inca-async-entity-writer (owned by inca-core-dev) writes entities via EntityService upon consuming Kafka messages
    - name: inca-ingestion-dev
      type: stream-aligned
      description: |
        Owns the merchant feed ingestion pipeline end-to-end: feed API, feed processing workers, image handling, and Hive data ingestion. Aligned to the merchant feed submission and data ingestion flow.
      size: 5
      owns:
        - Feed Ingestion & Processing
        - Feed Submission & Job Tracking
        - Hive Data Ingestion
        - Image Processing & Management
      interacts:
        - with: inca-core-dev
          mode: x-as-a-service
          via: Entity CRUD & Lifecycle
          description: Feed workers and feed-api read/write catalog entities through inca-core's EntityService
        - with: inca-ingestion-dev
          mode: collaboration
          via: Hive Data Ingestion
          description: inca-hive-ingester is part of the ingestion team's portfolio, writing Hive-sourced entities to inca-core
        - with: inca-model-conversion-dev
          mode: x-as-a-service
          via: Menu Cache Generation
          description: inca-feed-worker calls MenuCacheWorkerService to invalidate and regenerate caches after feed changes
        - with: inca-publisher-dev
          mode: x-as-a-service
          via: Entity Publishing & Validation
          description: inca-feed-worker triggers entity publishing via PublisherService after writing feed entities
    - name: inca-model-conversion-dev
      type: stream-aligned
      description: |
        Owns menu cache generation and model conversion workflows; aligned to the catalog-to-menu data pipeline and serving cache population.
      size: 5
      owns:
        - Data Transformation & Conversion
        - Menu Cache Generation
    - name: inca-observability-dev
      type: complicated-subsystem
      description: |
        Owns statistical regression detection, real-time monitoring, issue tracking, backup/restore, and platform health status. Specializes in the deep statistics and reliability capabilities that underpin catalog quality guarantees.
      size: 5
      owns:
        - Backup & Point-in-Time Recovery
        - Issue Tracking & Management
        - Platform Health Monitoring
        - Regression Detection & Statistical Analysis
      interacts:
        - with: inca-core-dev
          mode: x-as-a-service
          via: Entity CRUD & Lifecycle
          description: inca-backup reads all entities via ScanCatalog and writes them back on restore
        - with: inca-model-conversion-dev
          mode: x-as-a-service
          via: Menu Cache Generation
          description: inca-regression-detector calls MenuCacheWorkerService to access cached menu baseline data
    - name: inca-publisher-dev
      type: stream-aligned
      description: |
        Owns entity publishing, validation, and downstream enrichment services including entity construction, async writes, and data scrubbing. Aligned to the entity publishing and distribution flow.
      size: 5
      owns:
        - Catalog Entity Enrichment
        - Data Scrubbing & Cleanup
        - Entity Construction
        - Entity Publishing & Validation
      interacts:
        - with: inca-core-dev
          mode: x-as-a-service
          via: Entity CRUD & Lifecycle
          description: Publisher and entity-builder read entities from inca-core before publishing and construction
        - with: inca-observability-dev
          mode: x-as-a-service
          via: Regression Detection & Statistical Analysis
          description: inca-publisher-worker queries inca-realtime-stats before making publishing decisions
    - name: inca-serving
      type: stream-aligned
      description: |
        Owns the eater-facing serving layer: the CatalogServing API, the serving gateway, and the serving-ingestor that keeps serving data synchronized. Aligned to the consumer read path. (LDAP group name: "inca".)
      size: 5
      owns:
        - Real-time Catalog Serving
        - Serving Data Synchronization
      interacts:
        - with: inca-core-dev
          mode: x-as-a-service
          via: Entity CRUD & Lifecycle
          description: Serving-ingestor reads full entity details from inca-core when processing change notifications
platforms:
    - name: Uber Eats Infrastructure Platform
      description: |
        Shared infrastructure services providing workflow orchestration (Cadence), event streaming (Kafka/Heatpipe), schemaless storage (Docstore/Safe DB), blob storage (Terrablob), and feature flags (Flipr). All INCA services consume these as external platform primitives.
      teams:
        - inca-core-dev
data_assets:
    - name: catalog_item_mapping_v1
      type: database
      description: Docstore collection mapping menu item UUIDs to catalog item and product entries in the serving layer
      usedBy:
        - target: inca-serving-ingestor
          access: read-write
    - name: catalog_item_v1
      type: database
      description: Serving-layer Docstore collection with denormalized item records optimized for high-throughput reads
      usedBy:
        - target: inca-serving-ingestor
          access: read-write
        - target: inca-serving
          access: read
        - target: inca-query
          access: read
    - name: catalog_product_v1
      type: database
      description: Serving-layer Docstore collection with denormalized product records for the serving path
      usedBy:
        - target: inca-serving-ingestor
          access: read-write
        - target: inca-serving
          access: read
    - name: hp-eats_store-menu_entity_update_v4
      type: event-stream
      description: Heatpipe topic from the eats_store system notifying INCA of external menu entity updates requiring catalog synchronization
      producedBy: eats-store
      consumedBy:
        - inca-serving-ingestor
    - name: inca.core.entity_change
      type: event-stream
      description: Heatpipe (Kafka) topic emitting entity change events whenever catalog entities are created, updated, or deleted in inca-core
      producedBy: inca-core
      consumedBy:
        - inca-serving-ingestor
    - name: inca.regression.stats
      type: event-stream
      description: Kafka topic carrying per-catalog statistical measurements for regression baseline tracking
      producedBy: inca-regression-detector
      consumedBy:
        - inca-realtime-stats
    - name: inca.regressions
      type: event-stream
      description: Kafka topic carrying regression events detected by regression-detector for alerting and monitoring consumers
      producedBy: inca-regression-detector
      consumedBy:
        - inca-realtime-stats
    - name: inca_backref_v1
      type: database
      description: Docstore collection storing back-reference relationships between catalog entities
      usedBy:
        - target: inca-core
          access: read-write
    - name: inca_entity_metadata_v1
      type: database
      description: Docstore collection storing entity metadata (touched_at, provided_at) for change tracking
      usedBy:
        - target: inca-core
          access: read-write
    - name: inca_entity_v2
      type: database
      description: Primary Docstore collection storing all catalog entity records — the authoritative source of truth for INCA
      usedBy:
        - target: inca-core
          access: read-write
    - name: inca_extension_v2
      type: database
      description: Docstore collection storing flexible schema extension attributes for catalog entities
      usedBy:
        - target: inca-core
          access: read-write
    - name: inca_external_id_v2
      type: database
      description: Docstore collection mapping external source identifiers to INCA entity UUIDs
      usedBy:
        - target: inca-core
          access: read-write
    - name: rawdata_user.kafka_hp_inca_core_entity_change_nodedup
      type: event-stream
      description: Deduplication-free Kafka topic of INCA core entity change events; consumed by inca-serverless enrichers to find entities with PEF metadata that need enrichment
      producedBy: inca-core
      consumedBy:
        - inca-serverless
external_dependencies:
    - name: cadence
      description: Uber's Cadence workflow orchestration platform
    - name: concord
      description: Uber's OAuth and identity service
    - name: customer-gateway
      description: Uber's customer profile and identity platform
    - name: docstore
      description: Uber's Docstore (Safe DB) providing schemaless MySQL-backed document storage
    - name: eats-store
      description: Uber Eats store platform; also produces hp-eats_store-menu_entity_update_v4 Kafka events
    - name: flipr
      description: Uber's feature flag and dynamic configuration platform
    - name: kms-gateway
      description: Key management service providing encryption keys
    - name: restaurant-gateway
      description: Restaurant data platform providing store and restaurant information
    - name: terrablob
      description: Uber's distributed blob storage system
    - name: winterfell
      description: Uber Eats pricing service
