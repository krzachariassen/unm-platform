system:
  name: "Relationship Test System"
  description: "Tests mixed short/long form relationships"

actors:
  - name: "Customer"
    description: "A customer actor"
  - name: "Admin"
    description: "An admin actor"

needs:
  - name: "Short form need"
    actor: "Customer"
    outcome: "Customer is served"
    supportedBy:
      - "Search Capability"
      - "Catalog Capability"

  - name: "Long form need"
    actor: "Admin"
    outcome: "Admin manages system"
    supportedBy:
      - target: "Search Capability"
        description: "Admin uses search to find records"
      - target: "Catalog Capability"
        description: "Admin manages catalog entries"

capabilities:
  - name: "Search Capability"
    description: "Provides search functionality"
    realizedBy:
      - "search-service"
      - target: "search-index-service"
        description: "Underlying index management"
        role: "supporting"
    dependsOn:
      - "Catalog Capability"

  - name: "Catalog Capability"
    description: "Provides catalog management"
    realizedBy:
      - target: "catalog-service"
        role: "primary"
        description: "Main catalog service"

services:
  - name: "search-service"
    description: "Handles search queries"
    ownedBy: "Platform Team"
    dependsOn:
      - "catalog-service"
      - target: "search-index-service"
        description: "Reads from index"

  - name: "search-index-service"
    description: "Manages the search index"
    ownedBy: "Platform Team"

  - name: "catalog-service"
    description: "Manages catalog data"
    ownedBy: "Catalog Team"

teams:
  - name: "Platform Team"
    type: "platform"
    description: "Provides platform capabilities"
    owns:
      - "Search Capability"

  - name: "Catalog Team"
    type: "stream-aligned"
    description: "Owns catalog domain"
    owns:
      - "Catalog Capability"

interactions:
  - from: "Platform Team"
    to: "Catalog Team"
    mode: "x-as-a-service"
    via: "Catalog Capability"
    description: "Platform uses catalog as a service"
